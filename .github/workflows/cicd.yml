name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['18', '20']
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install Dependencies
        run: npm install
      - name: Package the App
        run: npm pack
      - name: Upload Artifact
        if: matrix.node-version == '20'
        uses: actions/upload-artifact@v4
        with:
          name: app-package
          path: '*.tgz'

  dockerize_and_scan:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: app-package
      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/simple-nodejs-app:latest .
      - name: Security Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKER_USERNAME }}/simple-nodejs-app:latest'
          format: 'table'
          exit-code: '0'
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Push Image to Docker Hub
        run: docker push ${{ secrets.DOCKER_USERNAME }}/simple-nodejs-app:latest

  deploy:
    needs: dockerize_and_scan
    environment: production
    runs-on: self-hosted
    steps:
      - name: Deploy Container
        run: |
          docker pull ${{ secrets.DOCKER_USERNAME }}/simple-nodejs-app:latest
          docker stop nodejs-app || true
          docker rm nodejs-app || true
          docker run -d --name nodejs-app -p 3000:3000 ${{ secrets.DOCKER_USERNAME }}/simple-nodejs-app:latest
